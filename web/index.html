<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk-Cam</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 16px;
        }
        h1 { font-size: 20px; margin-bottom: 16px; color: #e94560; }

        /* Two-column layout */
        .columns {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 16px;
            align-items: start;
        }
        @media (max-width: 800px) {
            .columns { grid-template-columns: 1fr; }
        }

        .section {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section h2 {
            font-size: 14px; margin-bottom: 10px;
            background: #e94560; display: inline-block;
            padding: 2px 10px; border-radius: 4px; color: #fff;
        }
        label { display: block; font-size: 13px; margin-bottom: 4px; color: #aaa; }
        input[type="number"] {
            width: 100%; padding: 6px; border: 1px solid #333;
            border-radius: 4px; background: #0f3460; color: #eee; font-size: 13px;
        }
        .roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .roi-grid .full-width { grid-column: 1 / -1; }
        button {
            padding: 8px 14px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 13px; font-weight: 600;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-secondary { background: #0f3460; color: #fff; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-refresh { background: #2980b9; color: #fff; }
        .btn-toggle { background: #2ecc71; color: #fff; min-width: 80px; }
        .btn-toggle.off { background: #7f8c8d; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .preset-item {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 8px; background: #0f3460; border-radius: 4px; margin-bottom: 4px;
        }
        .preset-item .name { flex: 1; font-weight: 600; font-size: 13px; }
        .preset-item .dims { font-size: 11px; color: #888; }
        .preset-item button { padding: 4px 10px; font-size: 11px; }
        .new-preset-row { display: flex; gap: 6px; margin-top: 8px; }
        .new-preset-row input {
            flex: 1; padding: 6px; border: 1px solid #333;
            border-radius: 4px; background: #0f3460; color: #eee; font-size: 13px;
        }

        /* Preview */
        #preview-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #preview-img { width: 100%; display: block; }
        #roi-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #preview-bar {
            display: flex; align-items: center; gap: 8px; margin-top: 6px;
        }
        #preview-status { font-size: 11px; color: #888; flex: 1; }
        .roi-info { font-size: 11px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>Desk-Cam</h1>

    <div class="columns">
        <!-- Left: Preview -->
        <div>
            <div class="section">
                <h2>Preview</h2>
                <div id="preview-wrapper">
                    <img id="preview-img" alt="preview">
                    <canvas id="roi-canvas"></canvas>
                </div>
                <div id="preview-bar">
                    <span id="preview-status">Loading...</span>
                    <button class="btn-refresh" id="refresh-btn" onclick="refreshSnapshot()">Refresh</button>
                </div>
            </div>
        </div>

        <!-- Right: Controls -->
        <div>
            <!-- ROI -->
            <div class="section">
                <h2>ROI</h2>
                <div class="roi-grid">
                    <div><label>X</label><input type="number" id="roi-x" min="0" step="1"></div>
                    <div><label>Y</label><input type="number" id="roi-y" min="0" step="1"></div>
                    <div><label>W</label><input type="number" id="roi-w" min="100" step="1"></div>
                    <div><label>H</label><input type="number" id="roi-h" min="100" step="1"></div>
                    <div class="full-width btn-row">
                        <button class="btn-primary" onclick="applyROI()">Apply</button>
                        <button class="btn-secondary" onclick="resetROI()">Reset</button>
                    </div>
                </div>
                <div class="roi-info" id="roi-info"></div>
            </div>

            <!-- Presets -->
            <div class="section">
                <h2>Presets</h2>
                <div id="preset-list"></div>
                <div class="new-preset-row">
                    <input type="text" id="new-preset-name" placeholder="Name">
                    <button class="btn-primary" onclick="savePreset()">Save</button>
                </div>
            </div>

            <!-- Rotation -->
            <div class="section">
                <h2>Rotation</h2>
                <button id="rotation-btn" class="btn-toggle" onclick="toggleRotation()">180: ON</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        let state = { roi: {x:0,y:0,w:4056,h:3040}, rotation: true, presets: {}, sensor: {w:4056,h:3040}, crop_limits: {x:0,y:0,w:4056,h:3040}, snapshot_crop: {x:0,y:0,w:4056,h:3040} };
        let drag = null;

        const img = document.getElementById("preview-img");
        const canvas = document.getElementById("roi-canvas");
        const ctx = canvas.getContext("2d");
        const wrapper = document.getElementById("preview-wrapper");
        const statusEl = document.getElementById("preview-status");
        const refreshBtn = document.getElementById("refresh-btn");

        async function api(method, path, body) {
            const opts = { method, headers: {} };
            if (body !== undefined) {
                opts.headers["Content-Type"] = "application/json";
                opts.body = JSON.stringify(body);
            }
            const res = await fetch(path, opts);
            return res.json();
        }

        // --- Coordinate mapping (sensor <-> screen) ---
        function screenToSensor(clientX, clientY) {
            const rect = wrapper.getBoundingClientRect();
            const sc = state.snapshot_crop;
            return {
                x: sc.x + ((clientX - rect.left) / rect.width) * sc.w,
                y: sc.y + ((clientY - rect.top) / rect.height) * sc.h
            };
        }
        function sensorToCanvas(sx, sy) {
            const sc = state.snapshot_crop;
            return {
                x: ((sx - sc.x) / sc.w) * canvas.width,
                y: ((sy - sc.y) / sc.h) * canvas.height
            };
        }

        // --- Draw ROI overlay ---
        function drawROI() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const r = state.roi;
            const tl = sensorToCanvas(r.x, r.y);
            const br = sensorToCanvas(r.x + r.w, r.y + r.h);
            const rw = br.x - tl.x, rh = br.y - tl.y;
            // Dim outside
            ctx.fillStyle = "rgba(0,0,0,0.35)";
            ctx.fillRect(0, 0, canvas.width, tl.y);
            ctx.fillRect(0, br.y, canvas.width, canvas.height - br.y);
            ctx.fillRect(0, tl.y, tl.x, rh);
            ctx.fillRect(br.x, tl.y, canvas.width - br.x, rh);
            // Border
            ctx.strokeStyle = "#e94560";
            ctx.lineWidth = 2;
            ctx.strokeRect(tl.x, tl.y, rw, rh);
            // Handles
            const hs = 10;
            ctx.fillStyle = "#e94560";
            ctx.fillRect(tl.x-hs/2, tl.y-hs/2, hs, hs);
            ctx.fillRect(br.x-hs/2, tl.y-hs/2, hs, hs);
            ctx.fillRect(tl.x-hs/2, br.y-hs/2, hs, hs);
            ctx.fillRect(br.x-hs/2, br.y-hs/2, hs, hs);
            // Label
            ctx.fillStyle = "#e94560";
            ctx.font = "12px sans-serif";
            ctx.fillText(`${Math.round(r.w)}x${Math.round(r.h)}`, tl.x+4, tl.y>16 ? tl.y-4 : tl.y+14);
        }

        // --- Drag interaction ---
        const HR = 20;
        function hitTest(cx, cy) {
            const rect = wrapper.getBoundingClientRect();
            const mx = cx-rect.left, my = cy-rect.top;
            const r = state.roi;
            const tl = sensorToCanvas(r.x, r.y);
            const br = sensorToCanvas(r.x+r.w, r.y+r.h);
            if (Math.hypot(mx-tl.x,my-tl.y)<HR) return "nw";
            if (Math.hypot(mx-br.x,my-tl.y)<HR) return "ne";
            if (Math.hypot(mx-tl.x,my-br.y)<HR) return "sw";
            if (Math.hypot(mx-br.x,my-br.y)<HR) return "se";
            const em=12;
            if (mx>=tl.x-em&&mx<=br.x+em&&Math.abs(my-tl.y)<em) return "n";
            if (mx>=tl.x-em&&mx<=br.x+em&&Math.abs(my-br.y)<em) return "s";
            if (my>=tl.y-em&&my<=br.y+em&&Math.abs(mx-tl.x)<em) return "w";
            if (my>=tl.y-em&&my<=br.y+em&&Math.abs(mx-br.x)<em) return "e";
            if (mx>=tl.x&&mx<=br.x&&my>=tl.y&&my<=br.y) return "move";
            return null;
        }
        function clampROI(roi) {
            const cl = state.crop_limits;
            roi.w=Math.max(100,Math.min(roi.w,cl.w));
            roi.h=Math.max(100,Math.min(roi.h,cl.h));
            roi.x=Math.max(cl.x,Math.min(roi.x,cl.x+cl.w-roi.w));
            roi.y=Math.max(cl.y,Math.min(roi.y,cl.y+cl.h-roi.h));
            return roi;
        }
        function onDown(e) {
            const t=e.touches?e.touches[0]:e;
            const type=hitTest(t.clientX,t.clientY);
            if(!type) return;
            e.preventDefault();
            const sp=screenToSensor(t.clientX,t.clientY);
            drag={type,sx:sp.x,sy:sp.y,orig:{...state.roi}};
        }
        function onMove(e) {
            const t=e.touches?e.touches[0]:e;
            if(!drag) {
                const type=hitTest(t.clientX,t.clientY);
                const cur={nw:"nw-resize",ne:"ne-resize",sw:"sw-resize",se:"se-resize",
                    n:"n-resize",s:"s-resize",w:"w-resize",e:"e-resize",move:"move"};
                wrapper.style.cursor=cur[type]||"crosshair";
                return;
            }
            e.preventDefault();
            const sp=screenToSensor(t.clientX,t.clientY);
            const dx=sp.x-drag.sx, dy=sp.y-drag.sy;
            const o=drag.orig;
            let r;
            switch(drag.type) {
                case "move": r={x:o.x+dx,y:o.y+dy,w:o.w,h:o.h}; break;
                case "se": r={x:o.x,y:o.y,w:o.w+dx,h:o.h+dy}; break;
                case "nw": r={x:o.x+dx,y:o.y+dy,w:o.w-dx,h:o.h-dy}; break;
                case "ne": r={x:o.x,y:o.y+dy,w:o.w+dx,h:o.h-dy}; break;
                case "sw": r={x:o.x+dx,y:o.y,w:o.w-dx,h:o.h+dy}; break;
                case "n": r={x:o.x,y:o.y+dy,w:o.w,h:o.h-dy}; break;
                case "s": r={x:o.x,y:o.y,w:o.w,h:o.h+dy}; break;
                case "w": r={x:o.x+dx,y:o.y,w:o.w-dx,h:o.h}; break;
                case "e": r={x:o.x,y:o.y,w:o.w+dx,h:o.h}; break;
            }
            state.roi=clampROI(r);
            drawROI();
            syncInputs();
        }
        function onUp() {
            if(!drag) return;
            drag=null;
            state.roi.x=Math.round(state.roi.x);
            state.roi.y=Math.round(state.roi.y);
            state.roi.w=Math.round(state.roi.w);
            state.roi.h=Math.round(state.roi.h);
            syncInputs();
            applyROI();
        }
        wrapper.addEventListener("mousedown",onDown);
        wrapper.addEventListener("touchstart",onDown,{passive:false});
        window.addEventListener("mousemove",onMove);
        window.addEventListener("touchmove",onMove,{passive:false});
        window.addEventListener("mouseup",onUp);
        window.addEventListener("touchend",onUp);
        window.addEventListener("resize",drawROI);

        // --- Inputs ---
        function syncInputs() {
            document.getElementById("roi-x").value=Math.round(state.roi.x);
            document.getElementById("roi-y").value=Math.round(state.roi.y);
            document.getElementById("roi-w").value=Math.round(state.roi.w);
            document.getElementById("roi-h").value=Math.round(state.roi.h);
            const cl = state.crop_limits;
            document.getElementById("roi-info").textContent=
                `Crop: (${cl.x},${cl.y}) ${cl.w}x${cl.h}`;
        }

        // --- Snapshot ---
        function loadSnapshot() {
            const tmp = new Image();
            tmp.onload = function() {
                img.src = tmp.src;
                drawROI();
                statusEl.textContent = `Loaded ${new Date().toLocaleTimeString()}`;
            };
            tmp.onerror = function() {
                statusEl.textContent = "Failed to load snapshot";
            };
            tmp.src = "/api/snapshot?t=" + Date.now();
        }

        window.refreshSnapshot = async function() {
            refreshBtn.disabled = true;
            statusEl.textContent = "Capturing...";
            try {
                const res = await fetch("/api/snapshot/refresh", { method: "POST" });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    img.onload = function() { URL.revokeObjectURL(url); drawROI(); };
                    img.src = url;
                    statusEl.textContent = `Refreshed ${new Date().toLocaleTimeString()}`;
                } else {
                    statusEl.textContent = "Refresh failed";
                }
            } catch(e) {
                statusEl.textContent = "Refresh error";
            }
            refreshBtn.disabled = false;
        };

        // --- Actions ---
        window.applyROI = async function() {
            const roi = {
                x: parseInt(document.getElementById("roi-x").value)||0,
                y: parseInt(document.getElementById("roi-y").value)||0,
                w: parseInt(document.getElementById("roi-w").value)||4056,
                h: parseInt(document.getElementById("roi-h").value)||3040,
            };
            await api("POST", "/api/roi", roi);
            await fetchStatus();
        };
        window.resetROI = async function() {
            const cl = state.crop_limits;
            const roi = {x:cl.x, y:cl.y, w:cl.w, h:cl.h};
            await api("POST", "/api/roi", roi);
            await fetchStatus();
        };
        window.toggleRotation = async function() {
            const enabled = !state.rotation;
            await api("POST", "/api/rotation", {enabled});
            state.rotation = enabled;
            updateUI();
            refreshSnapshot();
        };
        window.savePreset = async function() {
            const input = document.getElementById("new-preset-name");
            const name = input.value.trim();
            if (!name) return;
            await api("POST", "/api/presets", {name});
            input.value = "";
            await fetchStatus();
        };
        window.loadPreset = async function(name) {
            await api("POST", `/api/presets/${encodeURIComponent(name)}/load`);
            await fetchStatus();
        };
        window.deletePreset = async function(name) {
            await api("DELETE", `/api/presets/${encodeURIComponent(name)}`);
            await fetchStatus();
        };

        function updateUI() {
            syncInputs();
            const btn=document.getElementById("rotation-btn");
            btn.textContent="180: "+(state.rotation?"ON":"OFF");
            btn.classList.toggle("off",!state.rotation);
            drawROI();
            renderPresets();
        }
        function renderPresets() {
            const list=document.getElementById("preset-list");
            list.innerHTML="";
            for (const [name,preset] of Object.entries(state.presets||{})) {
                const item=document.createElement("div");
                item.className="preset-item";
                const nameSpan=document.createElement("span");
                nameSpan.className="name";
                nameSpan.textContent=name;
                const dimsSpan=document.createElement("span");
                dimsSpan.className="dims";
                dimsSpan.textContent=`${preset.x},${preset.y} ${preset.w}x${preset.h}`;
                const loadBtn=document.createElement("button");
                loadBtn.className="btn-secondary";
                loadBtn.textContent="Load";
                loadBtn.addEventListener("click",()=>loadPreset(name));
                const delBtn=document.createElement("button");
                delBtn.className="btn-danger";
                delBtn.textContent="Del";
                delBtn.addEventListener("click",()=>deletePreset(name));
                item.append(nameSpan,dimsSpan,loadBtn,delBtn);
                list.appendChild(item);
            }
        }
        function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

        async function fetchStatus() {
            try { state=await api("GET","/api/status"); updateUI(); }
            catch(e) { console.error("fetchStatus:",e); }
        }

        fetchStatus().then(() => loadSnapshot());
    })();
    </script>
</body>
</html>
